<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact — Procestra</title>
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ochre-50:  #F8F0DC;
    --ochre-100: #F0E5CC;
    --ochre-200: #E0CCA8;
    --ochre-400: #C0A87A;
    --ochre-600: #9A8060;
    --ochre-800: #6A5040;
    --ink:       #1C1A14;
    --ink-60:    rgba(28,26,20,0.6);
    --border:    #DFD0B0;
    --font-brand: 'Fraunces', 'Palatino Linotype', Georgia, serif;
    --font-ui:    'DM Sans', system-ui, sans-serif;
    --r-md: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--ochre-100);
    color: var(--ink);
    font-family: var(--font-ui);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-wordmark {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink);
  }
  .nav-wordmark-text {
    font-family: var(--font-brand);
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    line-height: 1;
  }
  .nav-links { display: flex; gap: 1.5rem; align-items: baseline; }
  .nav-links a {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--ochre-600);
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  .nav-links a:hover { color: var(--ink); }
  .rule { max-width: 680px; margin: 0 auto; padding: 0 2rem; }
  .rule hr { border: none; border-top: 0.5px solid var(--border); }
  .content { max-width: 680px; margin: 0 auto; padding: 4rem 2rem 6rem; }
  .page-eyebrow {
    font-family: var(--font-ui);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ochre-600);
    margin-bottom: 1rem;
  }
  h1 {
    font-family: var(--font-brand);
    font-size: 34px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .intro {
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 300;
    line-height: 1.8;
    color: var(--ink-60);
    max-width: 480px;
    margin-bottom: 2.5rem;
  }

  /* FORM */
  .contact-form { display: flex; flex-direction: column; gap: 1rem; max-width: 480px; }
  .field { display: flex; flex-direction: column; gap: 0.35rem; }
  .field label {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ochre-600);
  }
  .field input,
  .field textarea {
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 300;
    background: var(--ochre-50);
    border: 0.5px solid var(--border);
    border-radius: var(--r-md);
    color: var(--ink);
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input::placeholder,
  .field textarea::placeholder { color: var(--ochre-400); }
  .field input:focus,
  .field textarea:focus { border-color: var(--ochre-600); }
  .field textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
  .form-submit {
    padding: 10px 24px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    background: var(--ink);
    color: var(--ochre-100);
    border: none;
    border-radius: var(--r-md);
    cursor: pointer;
    align-self: flex-start;
    transition: background 0.15s;
  }
  .form-submit:hover { background: var(--ochre-800); }
  .form-success {
    display: none;
    padding: 14px 18px;
    background: var(--ochre-50);
    border: 0.5px solid var(--border);
    border-radius: var(--r-md);
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 300;
    color: var(--ink-60);
    max-width: 480px;
    line-height: 1.7;
  }

  footer {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-top: 0.5px solid var(--border);
  }
  .footer-copy { font-family: var(--font-ui); font-size: 11px; color: var(--ochre-600); }
  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { font-family: var(--font-ui); font-size: 11px; color: var(--ochre-600); text-decoration: none; }
  .footer-links a:hover { color: var(--ink); }

  @media (max-width: 480px) {
    footer { flex-direction: column; gap: 1rem; }
  }
</style>
</head>
<body>

<!-- Netlify form detection -->
<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="text" name="name"/>
  <input type="email" name="email"/>
  <textarea name="message"></textarea>
</form>

<nav>
  <a href="/" class="nav-wordmark">
    <svg width="20" height="20" viewBox="1 1 20 20" fill="none" aria-hidden="true">
      <circle cx="5.5" cy="5.5" r="4.5" fill="#C87B5A"/>
      <circle cx="16.5" cy="5.5" r="4.5" fill="#B89B6A"/>
      <circle cx="5.5" cy="16.5" r="4.5" fill="#1D9E75"/>
      <circle cx="16.5" cy="16.5" r="4.5" fill="#5A6480"/>
    </svg>
    <span class="nav-wordmark-text">Procestra</span>
  </a>
  <div class="nav-links">
    <a href="/privacy.html">Privacy</a>
    <a href="/contact.html">Contact</a>
  </div>
</nav>

<div class="rule"><hr/></div>

<div class="content">
  <div class="page-eyebrow">Contact</div>
  <h1>Get in touch</h1>
  <p class="intro">Questions about Procestra or the beta? Send a note and we'll get back to you.</p>

  <form class="contact-form" id="contact-form" name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" novalidate>
    <input type="hidden" name="form-name" value="contact"/>
    <p hidden><label>Don't fill this out: <input name="bot-field"/></label></p>

    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name"/>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email" inputmode="email"/>
    </div>

    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
    </div>

    <button type="submit" class="form-submit">Send message</button>
  </form>

  <div class="form-success" id="form-success">Got it. We'll get back to you at the address you provided.</div>
</div>

<footer>
  <span class="footer-copy">© 2026 Procestra</span>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="/privacy.html">Privacy</a>
  </div>
</footer>

<script>
  const form = document.getElementById('contact-form');
  const success = document.getElementById('form-success');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    try {
      await fetch('/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(data).toString(),
      });
      form.style.display = 'none';
      success.style.display = 'block';
    } catch {
      form.querySelector('button').textContent = 'Try again';
    }
  });
</script>

</body>
</html>
