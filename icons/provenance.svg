<svg width="1024" height="1024" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1.4"><stop offset="0%" stop-color="#2DC490"/><stop offset="100%" stop-color="#0D6B52"/></linearGradient>
    <linearGradient id="hi" x1="0" y1="0" x2="0.45" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.13"/><stop offset="60%" stop-color="white" stop-opacity="0"/></linearGradient>
    <clipPath id="clip"><rect width="120" height="120" rx="27"/></clipPath>
    <mask id="linemask">
      <rect width="120" height="120" fill="white"/>
      <circle cx="42" cy="30" r="6" fill="black"/>
      <circle cx="82" cy="44" r="6" fill="black"/>
      <circle cx="42" cy="60" r="6" fill="black"/>
      <circle cx="42" cy="88" r="6" fill="black"/>
    </mask>
  </defs>
  <rect width="120" height="120" rx="27" fill="url(#bg)"/>
  <rect width="120" height="120" rx="27" fill="url(#hi)" clip-path="url(#clip)"/>
  <!-- group opacity: spine + ORIGINAL curved branch at full opacity, faded as one unit, masked behind dots -->
  <g opacity="0.55" mask="url(#linemask)" stroke="#FAF6EF" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M42 26 L42 88"/>
    <path d="M42 52 Q42 44 54 44 L82 44"/>
  </g>
  <circle cx="42" cy="30" r="6" fill="#FAF6EF" opacity="0.95"/>
  <circle cx="82" cy="44" r="6" fill="#FAF6EF" opacity="0.82"/>
  <circle cx="42" cy="60" r="6" fill="#FAF6EF" opacity="0.70"/>
  <circle cx="42" cy="88" r="6" fill="#FAF6EF" opacity="0.38"/>
  <rect width="120" height="120" rx="27" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.14" clip-path="url(#clip)"/>
</svg>
